<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm mượn sách mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; }
    </style>
</head>
<body>
<div class="container py-5">

    <div class="d-flex justify-content-between mb-4">
        <h2 class="text-success">➕ Thêm Phiếu mượn</h2>
        <a href="/borrowrecords" class="btn btn-outline-secondary">↩️ Quay lại danh sách</a>
    </div>

    <div class="card p-4 shadow">
        <form th:action="@{/borrowrecords/add}" th:object="${borrowrecord}" method="post">

            <div class="mb-3">
                <label class="form-label">Mã sinh viên:</label>
                <input type="text" th:field="*{studentId}" class="form-control" placeholder="Nhập mã sinh viên" required>
                <div th:if="${studentError}" class="text-danger mt-1" th:text="${studentError}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Mã sách:</label>
                <input type="text" th:field="*{bookId}" class="form-control" placeholder="Nhập mã sách" required>
                <div th:if="${bookError}" class="text-danger mt-1" th:text="${bookError}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Ngày mượn:</label>
                <input type="date" th:field="*{borrowDate}" class="form-control" required>
            </div>

            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-success px-4">💾 Lưu</button>
                <a href="/borrowrecords" class="btn btn-secondary px-4">❌ Hủy</a>
            </div>

        </form>
    </div>

</div>
</body>
</html>
