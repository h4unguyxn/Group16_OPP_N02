<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Thư viện</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .icon {
            font-size: 3rem;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <h1 class="mb-5 text-center text-primary">📚 Hệ thống Quản lý Thư viện</h1>

    <div class="row g-4 justify-content-center">

        <div class="col-md-3">
            <a href="/books" class="text-decoration-none">
                <div class="card shadow text-center p-4">
                    <div class="icon mb-3">📖</div>
                    <h4 class="text-dark">Quản lý Sách</h4>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a href="/students" class="text-decoration-none">
                <div class="card shadow text-center p-4">
                    <div class="icon mb-3">🎓</div>
                    <h4 class="text-dark">Quản lý Sinh viên</h4>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a href="/borrowrecords" class="text-decoration-none">
                <div class="card shadow text-center p-4">
                    <div class="icon mb-3">📄</div>
                    <h4 class="text-dark">Quản lý Phiếu mượn</h4>
                </div>
            </a>
        </div>

    </div>
</div>
</body>
</html>
